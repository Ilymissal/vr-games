        const container = document.getElementById('games');
        const searchInput = document.getElementById('searchInput');
        const ageFilter = document.getElementById('ageFilter');

        function getAgeGroup(age) {
            if (!age) return "";
            if (age === "0+" || age === "3+" || age === "6+") return "3-6";
            if (age === "8+" || age === "10+" || age === "12+") return "8-12";
            return "14-18";
        }

        function filterGames() {
            const searchText = searchInput.value.toLowerCase().trim();
            const selectedGroup = ageFilter.value;

            const filtered = games.filter(game => {
                const matchSearch = game.title.toLowerCase().includes(searchText) ||
                                   (game.genre && game.genre.toLowerCase().includes(searchText));
                
                let matchAge = true;
                if (selectedGroup) {
                    const gameGroup = getAgeGroup(game.age);
                    matchAge = gameGroup === selectedGroup;
                }
                return matchSearch && matchAge;
            });

            renderGames(filtered);
        }

        function renderGames(filteredGames) {
            container.innerHTML = '';
            filteredGames.forEach((game, index) => {
                const globalIndex = games.indexOf(game);
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <img src="${game.image}" alt="${game.title}">
                    <div class="info">
                        <h3>${game.title}</h3>
                        <div class="genre-age">
                            <span class="genre">${game.genre}</span> • ${game.age}
                        </div>
                        <p>${game.description.substring(0, 130)}...</p>
                        <button onclick="showDetails(${globalIndex})">Подробнее</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        searchInput.addEventListener('input', filterGames);
        ageFilter.addEventListener('change', filterGames);

        renderGames(games);

        function showDetails(index) {
            const game = games[index];
            
            document.getElementById('modal-main-image').src = game.image;
            document.getElementById('modal-title').textContent = game.title;
            document.getElementById('modal-description').textContent = game.description;
            
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
